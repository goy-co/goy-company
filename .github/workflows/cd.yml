name: CD (Deploy e Release em Produção)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # 1. DEPLOY DO CLOUDFLARE WORKER
  deploy-worker:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    if: github.repository_owner == 'the-goy-company'
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v6

      - name: Instalar o pnpm
        uses: pnpm/action-setup@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Instalar Dependências
        run: pnpm install --frozen-lockfile

      - name: Gerar wrangler.jsonc de Produção
        run: |
          sed -e "s/KV_ID_PLACEHOLDER/${{ secrets.CLOUDFLARE_KV_ID }}/g" \
              -e "s/R2_BUCKET_PLACEHOLDER/${{ secrets.CLOUDFLARE_R2_BUCKET }}/g" \
              -e "s/D1_ID_PLACEHOLDER/${{ secrets.CLOUDFLARE_D1_ID }}/g" \
              -e 's/"ENVIRONMENT": "development"/"ENVIRONMENT": "production"/g' \
              apps/be-api/wrangler.example.jsonc > apps/be-api/wrangler.jsonc

      - name: Deploy para o Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'apps/be-api'
          secrets: |
            SENTRY_DSN

  # 2. DEPLOY DOS SITES ASTRO (Corporate Site e Identity App)
  deploy-web-apps:
    name: Deploy Web Apps (Astro)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v6

      - name: Instalar o pnpm
        uses: pnpm/action-setup@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Instalar Dependências
        run: pnpm install --frozen-lockfile

      - name: Turborepo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build das Aplicações Web
        run: pnpm turbo run build --filter=@goy-co/fe-corporate --filter=@goy-co/fe-identity
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Deploy das aplicações Astro (mantidas como comentário para futura integração)
