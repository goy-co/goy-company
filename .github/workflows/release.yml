name: Release & Versionamento

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Publicar Versões e Artefactos
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"
      PNPM_SUPPLY_CHAIN_MINIMUM_RELEASE_AGE: 0
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar o pnpm
        uses: pnpm/action-setup@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Criar .npmrc Local para Publicação
        run: |
          echo "@goy-co:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Instalar Dependências
        run: pnpm install --frozen-lockfile

      - name: Criar Release PR ou Publicar
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm changeset publish
          commit: "chore(repo): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

